name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify CI passed on target commit
        run: |
          COMMIT_SHA="${{ github.sha }}"
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-runs")
          VERIFY_COUNT=$(echo "$RESPONSE" | jq '[.check_runs[] | select(.name | test("verify"))] | length')
          if [ "$VERIFY_COUNT" = "0" ]; then
            echo "::error::No CI verify check runs found for commit ${COMMIT_SHA}. Run CI first."
            exit 1
          fi
          FAILED_COUNT=$(echo "$RESPONSE" | jq '[.check_runs[] | select(.name | test("verify")) | select(.conclusion != "success")] | length')
          if [ "$FAILED_COUNT" != "0" ]; then
            echo "::error::CI verify has ${FAILED_COUNT} unsuccessful check run(s) for commit ${COMMIT_SHA}. Fix CI before deploying."
            exit 1
          fi
          echo "All CI verify check runs passed for ${COMMIT_SHA}"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: mkdir -p ~/.ssh
      - run: printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: chmod 600 ~/.ssh/id_ed25519
      - run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      - run: ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && git pull --ff-only && docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
