name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "design-qa/**"
      - ".codex-audit/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "design-qa/**"
      - ".codex-audit/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: sudo systemctl start postgresql.service
      - run: sudo -u postgres psql --command="CREATE USER studybox WITH PASSWORD 'ci-test-password';"
      - run: sudo -u postgres psql --command="CREATE DATABASE studybox OWNER studybox;"
      - run: npm ci
      - run: npm run build --workspace=@studybox/shared
      - run: npm run build --workspace=@studybox/api
      - run: node apps/api/dist/cli/migrate.js
        env:
          DATABASE_URL: postgresql://studybox:ci-test-password@localhost:5432/studybox
      - run: node apps/api/dist/cli/migrate.js
        env:
          DATABASE_URL: postgresql://studybox:ci-test-password@localhost:5432/studybox
